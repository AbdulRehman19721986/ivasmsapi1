<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { background: #0b1120; color: #e2e8f0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #111827; border: 1px solid #1f2d45; border-radius: 12px; padding: 2rem; width: 300px; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #1a2336; border: 1px solid #1f2d45; color: white; border-radius: 6px; }
        button { background: #f97316; border: none; padding: 0.5rem; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .error { color: #ef4444; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
