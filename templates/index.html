<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IVAS OTP Dashboard</title>
    <style>
        :root { --orange: #f97316; --dark-bg: #0a0c15; --card-bg: rgba(15, 20, 30, 0.7); --text-light: #eef2ff; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--dark-bg); color: var(--text-light); overflow-x: hidden; min-height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .app-container { position: relative; z-index: 10; backdrop-filter: blur(8px); background: rgba(10, 12, 21, 0.65); min-height: 100vh; padding: 1rem; max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        .logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--orange), #ff9a4a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.75rem; color: var(--text-muted); }
        .status-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); padding: 0.4rem 0.8rem; border-radius: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
        .dot.off { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: pulse-off 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes pulse-off { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.8); } }
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab-btn { background: rgba(30, 33, 48, 0.7); border: 1px solid transparent; padding: 0.5rem 1rem; border-radius: 20px; color: var(--text-muted); font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .tab-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); backdrop-filter: blur(8px); border-radius: 16px; padding: 1rem; border: 1px solid rgba(255,255,255,0.08); text-align: center; }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--orange); margin-top: 0.25rem; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        /* OTPs Tab Styles */
        .card { background: var(--card-bg); backdrop-filter: blur(8px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 1rem; }
        .card-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .form-controls { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        .form-label { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.25rem; display: block; }
        .form-control { width: 100%; background: #1a1f2e; border: 1px solid #2d3348; color: white; padding: 0.5rem; border-radius: 8px; }
        .btn { background: var(--orange); border: none; padding: 0.6rem 1rem; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; width: 100%; }
        .sms-body { min-height: 150px; padding: 1rem; color: #333; /* Color is for the injected HTML */ }
        .sms-empty { padding: 3rem 1rem; text-align: center; color: var(--text-muted); }
        /* Styles for content injected from IVAS */
        #ResultCDR { color: var(--text-light); }
        #ResultCDR .card { background: rgba(255,255,255,0.05); color: var(--text-light); }
        #ResultCDR .item, #ResultCDR .card-body { padding: 0.5rem 1rem; }
        #ResultCDR p { margin: 0; color: var(--text-light) !important; }
        #ResultCDR .col-sm-4 { font-weight: bold; color: var(--orange) !important; }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>IVAS Dashboard</h1>
            <p>Real-time SMS &amp; OTP Monitoring</p>
        </div>
        <div class="status-badge">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
        <button class="tab-btn" data-tab="otps">🔑 OTPs / Received</button>
    </div>

    <div id="tab-dashboard" class="tab-pane active">
        <div id="dashboard-error" style="display:none; color: #ef4444; text-align: center; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 8px; margin-bottom: 1rem;"></div>
        <h3>Today's Received SMS</h3>
        <div class="stats-grid" id="dash-stats-received"></div>
        <h3>Today's Live SMS</h3>
        <div class="stats-grid" id="dash-stats-live"></div>
    </div>

    <div id="tab-otps" class="tab-pane">
        <div class="card">
            <div class="card-header">
                <div class="form-controls">
                    <div class="form-group">
                        <label class="form-label" for="start_date">Start Date</label>
                        <input class="form-control" autocomplete="off" id="start_date" type="text" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="end_date">End Date</label>
                        <input class="form-control" autocomplete="off" id="end_date" type="text" />
                    </div>
                    <div class="form-group">
                        <button class="btn" id="getsms-btn">Get SMS</button>
                    </div>
                </div>
            </div>
            <div class="sms-body" id="ResultCDR">
                <div class="sms-empty">Select a date range and click "Get SMS" to load records.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Basic 3D Background ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const particles = new THREE.BufferGeometry();
    const count = 1500;
    const positions = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) { positions[i] = (Math.random() - 0.5) * 15; }
    particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({color: 0xf97316, size: 0.02, transparent: true, opacity: 0.7});
    const particleSystem = new THREE.Points(particles, material);
    scene.add(particleSystem);
    camera.position.z = 5;
    const animate = () => { requestAnimationFrame(animate); particleSystem.rotation.y += 0.0003; renderer.render(scene, camera); };
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Dashboard Logic ---
    document.addEventListener('DOMContentLoaded', () => {
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const dashboardError = document.getElementById('dashboard-error');
        const receivedStatsDiv = document.getElementById('dash-stats-received');
        const liveStatsDiv = document.getElementById('dash-stats-live');

        const setStatus = (isOk, message = '') => {
            statusDot.className = isOk ? 'dot' : 'dot off';
            statusText.innerText = isOk ? 'Connected' : (message || 'Auth Failed');
            if (!isOk) {
                dashboardError.textContent = message || 'Could not connect to IVAS. Please check your credentials or cookies.';
                dashboardError.style.display = 'block';
            } else {
                dashboardError.style.display = 'none';
            }
        };

        const renderStats = (data) => {
            const received = data.received || {};
            const live = data.live || {};
            receivedStatsDiv.innerHTML = `
                <div class="stat-card"><div class="stat-label">TOTAL SMS</div><div class="stat-value">${received.count_sms || '0'}</div></div>
                <div class="stat-card"><div class="stat-label">PAID</div><div class="stat-value">${received.paid_sms || '0'}</div></div>
                <div class="stat-card"><div class="stat-label">UNPAID</div><div class="stat-value">${received.unpaid_sms || '0'}</div></div>
                <div class="stat-card"><div class="stat-label">REVENUE</div><div class="stat-value">$${received.revenue || '0.00'}</div></div>`;
            liveStatsDiv.innerHTML = `
                <div class="stat-card"><div class="stat-label">SMS TODAY</div><div class="stat-value">${live.sms_today || '0'}</div></div>
                <div class="stat-card"><div class="stat-label">REVENUE</div><div class="stat-value">$${live.revenue || '0.00'}</div></div>`;
        };

        const fetchDashboardData = async () => {
            try {
                const res = await fetch('/api/all');
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || `Server returned status ${res.status}`);
                }
                const data = await res.json();
                setStatus(true);
                renderStats(data);
            } catch (error) {
                console.error('Fetch error:', error);
                setStatus(false, error.message);
            }
        };

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }));
        
        // Datepicker and Get SMS Button
        $('.form-control').datepicker({ format: 'yyyy-mm-dd', autoclose: true, todayHighlight: true });
        const today = new Date().toISOString().split('T')[0];
        $('#start_date, #end_date').val(today);

        $('#getsms-btn').on('click', function() {
            const btn = $(this);
            const resultDiv = $('#ResultCDR');
            const formData = new FormData();
            formData.append('from', $('#start_date').val());
            formData.append('to', $('#end_date').val());
            
            btn.prop('disabled', true).text('Loading...');
            resultDiv.html('<div class="sms-empty">Fetching data from IVAS...</div>');

            $.ajax({
                url: "/api/getsms",
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: (response) => resultDiv.html(response),
                error: (xhr) => resultDiv.html(`<div class="sms-empty" style="color:#ef4444;">${xhr.responseText || 'Request failed.'}</div>`),
                complete: () => btn.prop('disabled', false).text('Get SMS')
            });
        });

        // Initial Load
        fetchDashboardData();
        setInterval(fetchDashboardData, 60000); // Auto-refresh every 60 seconds
    });
</script>
</body>
</html>
